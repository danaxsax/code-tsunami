version: 2
backend:
  phases:
    build:
      commands:
        - npm install -g pnpm@9
        - npm install -g --force @aws-amplify/backend-cli
        - pnpm install --no-frozen-lockfile
        - pnpm rebuild esbuild
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - npm install -g --force @aws-amplify/backend-cli
        - pnpm install --no-frozen-lockfile
        - pnpm rebuild esbuild
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
